<style>

<body>

<nav>Ramesh 👑 Pro Restaurant</nav>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h1>Login</h2>
    <input type="text" id="username" placeholder="Enter Name">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container hidden" id="app">

    <h2>Menu</h2>

    <button onclick="add('Pizza',199)">Pizza ₹199</button>
    <button onclick="add('Burger',99)">Burger ₹99</button>
    <button onclick="add('Pasta',149)">Pasta ₹149</button>

    <h3>Cart</h3>
    <ul id="cart"></ul>
    <p>Total: ₹<span id="total">0</span></p>

    <button onclick="order()">Order Now</button>

    <h3>Book Table</h3>
    <input type="date" id="date">
    <input type="time" id="time">
    <button onclick="book()">Book</button>

    <p id="msg"></p>
</div>

<script>
let total = 0;

// LOGIN
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user=="" || pass==""){
        alert("Enter details");
        return;
    }

    localStorage.setItem("user", user);

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
}

// CART
function add(name, price){
    let li = document.createElement("li");
    li.innerText = name + " ₹" + price;
    document.getElementById("cart").appendChild(li);

    total += price;
    document.getElementById("total").innerText = total;
}

// ORDER (WhatsApp)
function order(){
    if(total==0){
        alert("Cart empty");
        return;
    }

    let user = localStorage.getItem("user");

    let message = "Order by " + user + " Total ₹" + total;

    let phone = "9301110483"; 

    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

    window.open(url);
}

// BOOKING
function book(){
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    if(date=="" || time==""){
        alert("Fill details");
        return;
    }

    localStorage.setItem("booking", date + " " + time);

    document.getElementById("msg").innerText = "✅ Table Booked!";
}
</script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
